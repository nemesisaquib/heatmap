<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Stats — Heatmap Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#070b1e;--surface:#121937;--surface-2:#1a2244;--border:rgba(120,150,255,0.14);
  --accent:#5b8cff;--accent-2:#22d3ee;--hot:#ff3d71;--ok:#2dd4a7;--warn:#ffb020;
  --text:#f1f4ff;--text-2:#9aa6cc;--text-3:#6b76a0;
  --f:'Sora',sans-serif;--m:'JetBrains Mono',monospace;
}
[data-theme="light"]{--bg:#f4f6fd;--surface:#fff;--surface-2:#f0f3ff;--border:rgba(40,60,140,.12);--text:#0c1230;--text-2:#4a567e;--text-3:#8a93b8;}
body{font-family:var(--f);background:var(--bg);color:var(--text);padding:18px;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(700px 400px at 90% -10%,rgba(91,140,255,.12),transparent 60%);pointer-events:none;}
.box{position:relative;max-width:760px;margin:0 auto;}
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.title{display:flex;align-items:center;gap:10px;}
.mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;}
.title b{font-weight:800;font-size:16px;letter-spacing:-.3px;}
.title span{font-size:12px;color:var(--text-3);font-family:var(--m);}
.live{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--text-2);font-family:var(--m);padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:999px;}
.ld{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:p 1.8s infinite;}
@keyframes p{0%{box-shadow:0 0 0 0 rgba(45,212,167,.5);}70%{box-shadow:0 0 0 7px rgba(45,212,167,0);}100%{box-shadow:0 0 0 0 rgba(45,212,167,0);}}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;right:-26px;top:-26px;width:80px;height:80px;border-radius:50%;background:var(--accent);opacity:.07;}
.kpi .l{font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--text-3);font-weight:700;}
.kpi .v{margin-top:8px;font-family:var(--m);font-weight:700;font-size:28px;letter-spacing:-1px;font-variant-numeric:tabular-nums;}
.kpi .v small{font-size:14px;color:var(--text-2);}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;}
.panel h3{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--text-2);font-weight:700;margin-bottom:16px;}
.bar{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.bar:last-child{margin-bottom:0;}
.bar .name{width:96px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;}
.bar .track{flex:1;height:12px;background:var(--surface-2);border-radius:6px;overflow:hidden;}
.bar .fill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.2,.8,.2,1);min-width:2px;}
.bar .num{width:64px;text-align:right;font-family:var(--m);font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
.dotc{width:9px;height:9px;border-radius:3px;flex-shrink:0;}

.foot{margin-top:14px;text-align:center;font-size:11px;color:var(--text-3);font-family:var(--m);}
.err{background:var(--surface);border:1px solid var(--hot);color:var(--hot);padding:18px;border-radius:14px;text-align:center;font-size:14px;}
@media(max-width:560px){.grid{grid-template-columns:1fr;}.bar .name{width:80px;}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div class="box">
  <div class="head">
    <div class="title">
      <div class="mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-3"/></svg></div>
      <div><b>Live Stats</b><br><span id="pidLabel">—</span></div>
    </div>
    <div class="live"><span class="ld"></span> <span id="liveLabel">live · 5s</span></div>
  </div>

  <div id="content">
    <div class="grid">
      <div class="kpi"><div class="l">Total Events</div><div class="v" id="kTotal">—</div></div>
      <div class="kpi"><div class="l">Unique Sessions</div><div class="v" id="kSessions">—</div></div>
      <div class="kpi"><div class="l">Avg Scroll</div><div class="v" id="kScroll">—</div></div>
    </div>

    <div class="panel">
      <h3>Events by type</h3>
      <div id="bars"></div>
    </div>

    <div class="foot" id="foot">Updated just now</div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const API = location.protocol.startsWith('http') ? location.origin : 'http://localhost:3000';
const params = new URLSearchParams(location.search);
const PROJECT = params.get('project');
if(params.get('theme')) document.documentElement.setAttribute('data-theme', params.get('theme'));

const METRICS = [
  { key:'pageview',  label:'Page views', color:'#5b8cff' },
  { key:'clicks',    label:'Clicks',     color:'#22d3ee' },
  { key:'scroll',    label:'Scroll',     color:'#2dd4a7' },
  { key:'move',      label:'Mouse',      color:'#ffb020' },
  { key:'attention', label:'Attention',  color:'#ff3d71' }
];

function fmt(n){ return (n||0).toLocaleString(); }

if(!PROJECT){
  $('#content').innerHTML = '<div class="err">No project specified.<br>Add <b>?project=YOUR-ID</b> to the URL.</div>';
} else {
  $('#pidLabel').textContent = PROJECT.slice(0,8) + '…';
  load();
  setInterval(load, 5000);
}

async function load(){
  try {
    const results = await Promise.all(METRICS.map(async m => {
      const r = await fetch(`${API}/api/heatmap/${PROJECT}?metric=${m.key}`);
      return { ...m, data: await r.json() };
    }));

    let total = 0, sessions = 0, scroll = null;
    results.forEach(r => {
      total += r.data.totalEvents || 0;
      sessions = Math.max(sessions, r.data.uniqueSessions || 0);
      if(r.key === 'scroll') scroll = r.data.avgScrollDepth;
    });
    const max = Math.max(...results.map(r => r.data.totalEvents || 0), 1);

    $('#kTotal').textContent = fmt(total);
    $('#kSessions').textContent = fmt(sessions);
    $('#kScroll').innerHTML = scroll ? Math.round(scroll) + '<small>%</small>' : '—';

    $('#bars').innerHTML = results.map(r => {
      const n = r.data.totalEvents || 0;
      const pct = (n / max * 100).toFixed(1);
      return `<div class="bar">
        <div class="name"><span class="dotc" style="background:${r.color}"></span>${r.label}</div>
        <div class="track"><div class="fill" style="width:${pct}%;background:${r.color}"></div></div>
        <div class="num">${fmt(n)}</div>
      </div>`;
    }).join('');

    const t = new Date();
    $('#foot').textContent = 'Updated ' + t.toLocaleTimeString();
  } catch(e) {
    $('#foot').textContent = '⚠️ Could not reach API — retrying…';
  }
}
</script>
</body>
</html>
